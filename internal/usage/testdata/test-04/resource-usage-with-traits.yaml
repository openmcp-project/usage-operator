# Ongoing ResourceUsage with active trait tracking — used for CompleteResourceUsage and StopTracking with traits
apiVersion: usage.open-control-plane.io/v1alpha1
kind: ResourceUsage
metadata:
  name: test-deployment-with-traits
spec:
  resource:
    group: apps
    version: v1
    kind: Deployment
    name: my-deployment
    namespace: default
  trackingPeriod:
    start: "2026-07-15T10:00:00Z"
    end: "2026-07-15T11:00:00Z"
  usage:
  - start: "2026-07-15T10:00:00Z"
  traits:
    replicas:
    - value: 3
      usage:
      - start: "2026-07-15T10:00:00Z"
    image:
    - value: "nginx:1.25"
      usage:
      - start: "2026-07-15T10:00:00Z"
