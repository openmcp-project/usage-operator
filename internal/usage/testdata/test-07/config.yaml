# Track: start tracking for a previously untracked object (no active usage entry, no traits)
apiVersion: usage.open-control-plane.io/v1alpha1
kind: UsageServiceConfig
metadata:
  name: test-07
spec:
  resourcesToTrack:
  - group: apps
    version: v1
    kind: Deployment
    resourceUsagePeriod: 1h
    traits:
      replicas:
        path: .resource.spec.replicas
