# MatchesSelector: namespace label selector
apiVersion: usage.open-control-plane.io/v1alpha1
kind: UsageServiceConfig
metadata:
  name: test-12
spec:
  resourcesToTrack:
  - group: apps
    version: v1
    kind: Deployment
    resourceUsagePeriod: 1h
    selector:
      namespace:
        selector:
          matchLabels:
            env: production
