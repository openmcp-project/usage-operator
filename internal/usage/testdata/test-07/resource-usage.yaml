# ResourceUsage with a closed usage entry — tracking was stopped, now resuming
apiVersion: usage.open-control-plane.io/v1alpha1
kind: ResourceUsage
metadata:
  name: test-deployment
spec:
  resource:
    group: apps
    version: v1
    kind: Deployment
    name: my-deployment
    namespace: default
  trackingPeriod:
    start: "2026-07-15T10:00:00Z"
    end: "2026-07-15T11:00:00Z"
  usage:
  - start: "2026-07-15T10:00:00Z"
    end: "2026-07-15T10:30:00Z"
  traits:
    replicas:
    - value: 3
      usage:
      - start: "2026-07-15T10:00:00Z"
        end: "2026-07-15T10:30:00Z"
