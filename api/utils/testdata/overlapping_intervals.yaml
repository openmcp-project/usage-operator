# Resource usage intervals that overlap each other — the merge logic must deduplicate them.
# Intervals: [10:00-11:00], [10:30-11:30], [12:00-13:00] → merged: [10:00-11:30] + [12:00-13:00] = 2h30m used.
# Tracking period covers all of this: 10:00-13:00 (3h), so remainder = 0.
apiVersion: usage.open-control-plane.io/v1alpha1
kind: ResourceUsage
metadata:
  name: overlapping-intervals
spec:
  resource:
    group: core.open-control-plane.io
    kind: ControlPlane
    name: test
    namespace: test-ns
    version: v1
  trackingPeriod:
    start: "2026-07-01T10:00:00Z"
    end: "2026-07-01T13:00:00Z"
  usage:
  - start: "2026-07-01T10:00:00Z"
    end: "2026-07-01T11:00:00Z"
  - start: "2026-07-01T10:30:00Z"
    end: "2026-07-01T11:30:00Z"
  - start: "2026-07-01T12:00:00Z"
    end: "2026-07-01T13:00:00Z"
  traits:
    flavor:
    - value: premium
      usage:
      - start: "2026-07-01T10:00:00Z"
        end: "2026-07-01T11:00:00Z"
      - start: "2026-07-01T10:30:00Z"
        end: "2026-07-01T11:30:00Z"
      - start: "2026-07-01T12:00:00Z"
        end: "2026-07-01T13:00:00Z"
status:
  phase: Completed
  totalTrackedDuration: 2h30m0s
