# Used for NewResourceUsage (with traits)
apiVersion: usage.open-control-plane.io/v1alpha1
kind: UsageServiceConfig
metadata:
  name: test-05
spec:
  resourcesToTrack:
  - group: apps
    version: v1
    kind: Deployment
    resourceUsagePeriod: 1h
    traits:
      replicas:
        path: .resource.spec.replicas
      image:
        path: .resource.spec.template.spec.containers[0].image
